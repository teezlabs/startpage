<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>//startpage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff9c; --blue: #00eaff; --pink: #ff00ff; --reddit: #ff4500;
      --bg: #030307; --card: #080810; --border: #151520;
    }

    * { box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg); zoom: 1.35; }

    /* Dot grid overlay */
    body::after {
      content: ''; position: fixed; inset: 0;
      background:
        linear-gradient(90deg, rgba(0,255,156,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,255,156,0.03) 1px, transparent 1px);
      background-size: 30px 30px; pointer-events: none; z-index: 0;
    }

    /* Ambient glow blobs */
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 15%, rgba(255,0,255,0.10), transparent 60%),
        radial-gradient(ellipse 80% 60% at 85% 15%, rgba(0,234,255,0.08), transparent 55%),
        radial-gradient(ellipse 80% 60% at 50% 85%, rgba(0,255,156,0.06), transparent 50%);
      filter: blur(40px); pointer-events: none; z-index: 0;
    }

    .neon-green { color: var(--green); text-shadow: 0 0 10px var(--green), 0 0 20px var(--green); }
    .neon-pink  { color: var(--pink);  text-shadow: 0 0 10px var(--pink),  0 0 20px var(--pink);  }
    .neon-blue  { color: var(--blue);  }

    /* Cards */
    .card {
      background: linear-gradient(180deg, rgba(8,8,16,0.95), rgba(6,6,12,0.95));
      border: 1px solid var(--border);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      overflow: hidden; position: relative;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(300px 150px at 20% 0%, rgba(0,234,255,0.07), transparent 60%),
        radial-gradient(300px 150px at 80% 0%, rgba(255,0,255,0.05), transparent 60%);
      pointer-events: none;
    }
    .card:hover {
      border-color: rgba(0,255,156,0.55);
      box-shadow: 0 0 0 1px rgba(0,255,156,0.12), 0 0 30px rgba(0,255,156,0.18), inset 0 0 40px rgba(0,255,156,0.04);
      transform: translateY(-2px);
    }

    /* Search */
    .search-form {
      background: linear-gradient(180deg, rgba(8,8,16,0.95), rgba(6,6,12,0.95));
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .search-form:focus-within {
      border-color: rgba(0,255,156,0.55);
      box-shadow: 0 0 0 1px rgba(0,255,156,0.12), 0 0 20px rgba(0,255,156,0.12);
    }

    /* Animations */
    .greeting { animation: glitch 5s infinite; }
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      96%       { transform: translate(0); }
      97%       { transform: translate(-2px, 2px); }
      98%       { transform: translate(2px, -2px); }
      99%       { transform: translate(-2px, -2px); }
    }

    .date-pulse { animation: datepulse 3s ease-in-out infinite; }
    @keyframes datepulse {
      0%, 100% { text-shadow: 0 0 5px var(--blue); }
      50%       { text-shadow: 0 0 15px var(--blue), 0 0 25px var(--blue); }
    }

    /* Feed toggle button */
    .feed-toggle {
      font-size: 0.65em; color: rgba(0,234,255,0.5); background: none;
      border: 1px solid rgba(0,234,255,0.2); border-radius: 4px;
      padding: 3px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em; transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .feed-toggle:hover {
      color: var(--blue); border-color: rgba(0,234,255,0.5);
      box-shadow: 0 0 8px rgba(0,234,255,0.2);
    }

    /* Ticker container (collapsed by default) */
    .ticker-container {
      width: 100%; overflow: hidden;
      max-height: 0;
      transition: max-height 0.1s ease 0.4s;
    }
    .ticker-container.open {
      max-height: 50px;
      transition: max-height 0.1s ease 0s;
    }

    /* News ticker */
    .ticker-wrap {
      width: 100%; display: flex; align-items: center; gap: 0;
      background: linear-gradient(90deg, rgba(255,69,0,0.08), rgba(255,69,0,0.03));
      border: 1px solid rgba(255,69,0,0.2);
      border-radius: 6px; overflow: hidden; position: relative;
      box-shadow: 0 0 12px rgba(255,69,0,0.08), inset 0 0 20px rgba(255,69,0,0.03);
      transform: translateX(110%);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1) 0s;
    }
    .ticker-container.open .ticker-wrap {
      transform: translateX(0);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1) 0.08s;
    }
    .ticker-wrap::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(255,69,0,0.015) 2px, rgba(255,69,0,0.015) 4px
      );
    }
    .ticker-label {
      font-size: 0.7em; color: var(--reddit); padding: 6px 10px;
      border-right: 1px solid rgba(255,69,0,0.2); white-space: nowrap; flex-shrink: 0;
      text-shadow: 0 0 8px var(--reddit); letter-spacing: 0.1em;
      background: rgba(255,69,0,0.06);
    }
    .ticker-track { overflow: hidden; flex: 1; }
    .ticker-inner {
      display: inline-block; white-space: nowrap; padding: 6px 0;
      animation: ticker-scroll 60s linear infinite;
    }
    .ticker-inner:hover { animation-play-state: paused; }
    @keyframes ticker-scroll {
      from { transform: translateX(100vw); }
      to   { transform: translateX(-100%); }
    }
    a.ticker-link {
      color: rgba(255,69,0,0.75); font-size: 0.72em; text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s; letter-spacing: 0.02em;
    }
    a.ticker-link:hover { color: var(--reddit); text-shadow: 0 0 8px var(--reddit); }
    .ticker-sep { color: rgba(255,69,0,0.3); padding: 0 16px; font-size: 0.72em; }

    /* Edit mode */
    .edit-input {
      background: rgba(0,255,156,0.05); border: 1px solid rgba(0,255,156,0.2);
      border-radius: 3px; color: #c0c0d0; font-family: 'JetBrains Mono', monospace;
      font-size: 0.72em; padding: 2px 5px; outline: none; min-width: 0;
    }
    .edit-input:focus { border-color: rgba(0,255,156,0.5); }
    .edit-x {
      color: rgba(255,80,80,0.5); background: none; border: none; cursor: pointer;
      font-size: 0.9em; padding: 0 2px; flex-shrink: 0; line-height: 1;
      transition: color 0.15s;
    }
    .edit-x:hover { color: #ff5050; }
    .edit-pencil {
      color: rgba(0,255,156,0.3); background: none; border: none; cursor: pointer;
      font-size: 0.72em; padding: 0 2px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .edit-pencil:hover { color: var(--green); }
    .edit-confirm {
      color: rgba(0,255,156,0.5); background: none; border: none; cursor: pointer;
      font-size: 0.82em; padding: 0 3px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .edit-confirm:hover { color: var(--green); }
    .edit-add-link {
      color: rgba(0,255,156,0.35); background: none;
      border: 1px dashed rgba(0,255,156,0.2); border-radius: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.68em;
      padding: 2px 6px; cursor: pointer; width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }
    .edit-add-link:hover { color: var(--green); border-color: rgba(0,255,156,0.5); }
    #edit-toggle {
      font-size: 0.65em; color: rgba(0,255,156,0.4); background: none;
      border: 1px solid rgba(0,255,156,0.2); border-radius: 4px;
      padding: 3px 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em; transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    #edit-toggle:hover, #edit-toggle.active {
      color: var(--green); border-color: rgba(0,255,156,0.5);
      box-shadow: 0 0 8px rgba(0,255,156,0.2);
    }
    .cards-edit a.link { pointer-events: none; cursor: default; }

    /* Links */
    a.link {
      color: #606070; font-size: 0.88em; text-decoration: none;
      transition: color 0.2s ease, text-shadow 0.2s ease; white-space: nowrap;
    }
    a.link:hover { color: var(--green); text-shadow: 0 0 8px rgba(0,255,156,0.6); }
  </style>
</head>

<body class="min-h-screen flex items-start justify-center pt-16 px-2 pb-2 text-[#a0a0b0]">
  <div class="relative z-10 flex flex-col items-center w-full max-w-5xl gap-2">

    <!-- Logo -->
    <img src="TL-Green.png" alt="TeezLabs" class="h-40 w-40">

    <!-- Greeting -->
    <h1 class="text-2xl font-bold tracking-wider neon-green">「 Hello Teez 」</h1>

    <!-- Date/time -->
    <div id="date" class="text-xs neon-blue date-pulse tracking-wide font-mono"></div>

    <!-- Search bar -->
    <form class="search-form flex items-center w-full max-w-md mt-4" action="https://duckduckgo.com/" method="get" target="_blank">
      <label for="search" class="sr-only">Search</label>
      <input
        id="search" type="text" name="q" placeholder="Search..." autofocus required
        class="flex-1 bg-transparent border-none outline-none text-[#c0c0d0] font-mono text-sm px-4 py-2 placeholder-[#404050]"
      >
      <button
        type="submit"
        class="text-[#00ff9c] border-l border-[#151520] px-4 py-2 text-xs hover:bg-[rgba(0,255,156,0.10)] hover:text-white transition-colors duration-200 font-mono"
      >Go</button>
    </form>

    <!-- Link categories (rendered by JS) -->
    <div id="cards-container" class="flex flex-wrap gap-3 justify-center w-full mt-4"></div>

    <!-- Toolbar -->
    <div class="w-full flex justify-end gap-2">
<button id="edit-toggle" onclick="toggleEdit()">✎ EDIT</button>
      <button id="feed-toggle" class="feed-toggle" onclick="toggleFeed()">▶ FEED</button>
    </div>

    <!-- Reddit Ticker -->
    <div id="ticker-container" class="ticker-container">
      <div class="ticker-wrap">
        <div class="ticker-label">REDDIT //</div>
        <div class="ticker-track">
          <div id="ticker-inner" class="ticker-inner">fetching headlines...</div>
        </div>
      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
